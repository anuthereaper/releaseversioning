name: Bump Version and Tag
on:
  push:
    branches:
      - main

jobs:
  bump-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Needed to fetch tags

      - name: Get latest tag
        id: get_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          echo "Latest tag: $latest_tag"
          echo "tag=${latest_tag}" >> $GITHUB_OUTPUT

      - name: Get PR labels
        id: labels
        #uses: snnaplab/get-labels-action@v1 #actions-ecosystem/action-get-latest-pr@v1
        run: |
          echo $github.event.label.name
          echo $github.event.label.name >> $labels

      - name: Determine bump type
        id: bump_type
        run: |
          bump="patch"
          if echo "${{ steps.labels.outputs.labels }}" | grep -q "version:major"; then
            bump="major"
          elif echo "${{ steps.labels.outputs.labels }}" | grep -q "version:minor"; then
            bump="minor"
          fi
          echo "bump=$bump" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump_version
        run: |
          IFS='.' read -r major minor patch <<<"${{ steps.get_tag.outputs.tag }}"
          case "${{ steps.bump_type.outputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac
          new_tag="v$major.$minor.$patch"
          echo "New tag: $new_tag"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Create new Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.bump_version.outputs.new_tag }}
          git push origin ${{ steps.bump_version.outputs.new_tag }}
