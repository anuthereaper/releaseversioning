name: Bump Version and Tag
on:
  push:
    branches:
      - main


permissions:
  contents: write
  
jobs:
  bump-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Needed to fetch tags 
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: get_tag
        run: |
            latest_tag=$(git describe --tags --abbrev=0 || echo "v0.0.0")
            echo "Latest tag: $latest_tag"
            echo "tag=${latest_tag}" >> $GITHUB_OUTPUT
  
      - name: Find the pull request that triggered the push
        id: find_pr
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.rest.repos.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                per_page: 1
              });
              const commitSha = commits.data[0].sha;
  
              const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: commitSha,
              });
  
              if (prs.data.length > 0) {
                const pr = prs.data[0];
                core.setOutput("pr_number", pr.number);
              } else {
                core.setFailed("No PR found for commit");
              }
  
      - name: Use versions
        run: |
            echo "Output: ${{ steps.find_pr.outputs.pr_number }}"

      - name: Get PR labels
        if: steps.find_pr.outputs.pr_number != ''
        id: get_labels
        uses: actions/github-script@v7
        with:
          script: |
              const prNumber = ${{steps.find_pr.outputs.pr_number}};
              const labels = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
  
              const labelNames = labels.data.map(label => label.name);
              console.log("Labels:", labelNames);
              core.setOutput("Labels", labelNames);
              core.setOutput("labels", labelNames.join(","));


      - name: Use labels in next step
        run: |
          echo "Labels on merged PR: ${{ steps.get_labels.outputs.labels }}"

      - name: Determine bump type
        id: bump_type
        run: |
          bump="patch"
          echo "${{steps.labels.outputs.labels}}"
          if echo "${{steps.get_labels.outputs.labels}}" | grep -q "version:major"; then
            bump="major"
          elif echo "${{steps.get_labels.outputs.labels}}" | grep -q "version:minor"; then
            bump="minor"
          fi
          echo "The bump will be $bump"
          echo "bump=$bump" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump_version
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}
          VERSION=${TAG#v}
          IFS='.' read -r major minor patch <<<"${VERSION}"
          case "${{ steps.bump_type.outputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac
          new_tag="v$major.$minor.$patch"
          echo "New tag: $new_tag"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or move 'latest' tag
        run: |
          git tag -f ${{ steps.bump_version.outputs.new_tag }}
          git push origin -f ${{ steps.bump_version.outputs.new_tag }}

